name: Build and Release

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android_app/gradlew

      - name: Build APK
        run: |
          cd android_app
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android_app/app/build/outputs/apk/release/app-release-unsigned.apk

  build-server:
    name: Build Windows Server
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S server -B server/build

      - name: Build Server
        run: cmake --build server/build --config Release

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagicMouseServer
          path: server/build/Release/MagicMouseServer.exe

  release:
    name: Create GitHub Release
    needs: [build-android, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release-artifacts/apk

      - name: Download Server
        uses: actions/download-artifact@v4
        with:
          name: MagicMouseServer
          path: release-artifacts/server

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/apk/app-release-unsigned.apk
            release-artifacts/server/MagicMouseServer.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
